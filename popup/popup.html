<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo">
      <span class="u-letter" id="u-letter">U</span><span class="brand">tiq Detector</span>
    </div>
    <div class="cache-info" id="cache-info"></div>
  </header>

  <div class="status-card" id="status-card">
    <span class="status-icon" id="status-icon">⏳</span>
    <span class="status-text" id="status-text"></span>
  </div>

  <div class="actions">
    <a id="more-info-link" href="#" target="_blank" rel="noopener noreferrer"></a>
    <a id="optout-link" href="#" target="_blank" rel="noopener noreferrer" style="display:none"></a>
  </div>

  <div class="report-block" id="report-block" style="display:none">
    <p class="report-prompt" id="report-prompt"></p>
    <button id="report-btn" class="report-btn"></button>
    <p class="report-feedback" id="report-feedback" style="display:none"></p>
  </div>

  <footer>
    <a id="footer-link" href="https://utiq-tracker.online" target="_blank" rel="noopener noreferrer">utiq-tracker.online</a>
    <span class="version" id="version"></span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
